spring.application.name=oasis-backend
server.port=${PORT:8080}
server.address=0.0.0.0

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

supabase.url=${SUPABASE_URL}
supabase.anonKey=${SUPABASE_ANON_KEY}
supabase.serviceRoleKey=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.profileTable=profiles
supabase.seriesTable=series
supabase.chaptersTable=chapters
supabase.savedTitlesTable=saved_titles
supabase.readingHistoryTable=reading_history
supabase.photoBucket=profile-photos

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
app.public-base-url=${APP_PUBLIC_BASE_URL:https://oasis-backend-zfr5.onrender.com}
